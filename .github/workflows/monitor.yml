name: R2 Excel Schema Monitor

permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows:
      - "Scrape Motorgy Monthly (Dynamic) — Cloudflare R2"
    types:
      - completed
  workflow_dispatch:
    inputs:
      date:
        description: "Target date YYYY-MM-DD (default today UTC)"
        required: false
        type: string
      fail_on_error:
        description: "Exit 1 if any check fails"
        required: false
        default: true
        type: boolean

jobs:
  validate:
    name: Validate R2 Excel Schema
    if: |
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'cancelled') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyyaml

      - name: Validate R2 Excel files
        run: |
          RUN_DATE="${{ github.event.inputs.date }}"
          if [ -z "$RUN_DATE" ]; then
            RUN_DATE=$(date -u +%Y-%m-%d)
          fi
          FLAGS="--date $RUN_DATE --quality"
          if [ "${{ github.event.inputs.fail_on_error }}" != "false" ]; then
            FLAGS="$FLAGS --fail-on-error"
          fi
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "Post-scrape validation for date: $RUN_DATE"
            echo "Triggered by: ${{ github.event.workflow_run.name }} (#${{ github.event.workflow_run.run_number }})"
          else
            echo "Manual validation for date: $RUN_DATE"
          fi
          python monitor/inspect_r2_schema.py $FLAGS
