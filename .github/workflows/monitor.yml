name: R2 Excel Schema Monitor

on:
  schedule:
    - cron: "0 8 * * 1-6"
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date YYYY-MM-DD (default yesterday UTC)"
        required: false
        type: string
      update_stats:
        description: "Update monitor_stats.yml in R2"
        required: false
        default: false
        type: boolean
      days_lookback:
        description: "Number of days to inspect"
        required: false
        default: "1"
        type: string
      quality_checks:
        description: "Run pandas data-quality checks"
        required: false
        default: false
        type: boolean
      fail_on_error:
        description: "Exit 1 if any check fails"
        required: false
        default: false
        type: boolean

jobs:
  daily-check:
    name: Daily R2 Validation
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 8 * * 1-6'
    runs-on: ubuntu-latest
    env:
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyyaml

      - name: Run daily validation
        run: |
          FLAGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            FLAGS="$FLAGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.update_stats }}" = "true" ]; then
            FLAGS="$FLAGS --update-stats"
          fi
          if [ -n "${{ github.event.inputs.days_lookback }}" ]; then
            FLAGS="$FLAGS --days-lookback ${{ github.event.inputs.days_lookback }}"
          fi
          if [ "${{ github.event.inputs.quality_checks }}" = "true" ]; then
            FLAGS="$FLAGS --quality"
          fi
          if [ "${{ github.event.inputs.fail_on_error }}" = "true" ]; then
            FLAGS="$FLAGS --fail-on-error"
          fi
          python monitor/inspect_r2_schema.py $FLAGS

  weekly-stats:
    name: Weekly Stats Refresh
    if: github.event_name == 'schedule' && github.event.schedule == '0 9 * * 0'
    runs-on: ubuntu-latest
    env:
      CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
      CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
      CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
      CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt pyyaml

      - name: Run weekly stats refresh
        run: python monitor/inspect_r2_schema.py --days-lookback 7 --update-stats --quality
